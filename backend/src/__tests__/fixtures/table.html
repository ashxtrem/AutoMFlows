<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Fixture</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .hidden-item { display: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .badge-active { background: #c8e6c9; color: #2e7d32; }
    .badge-inactive { background: #ffcdd2; color: #c62828; }
  </style>
</head>
<body>
  <h1 id="page-title" data-version="2.0">Product Catalog</h1>

  <table id="products">
    <thead>
      <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr class="product-row" data-id="1">
        <td class="product-name">Widget A</td>
        <td class="product-price">$19.99</td>
        <td><span class="badge badge-active">Active</span></td>
      </tr>
      <tr class="product-row" data-id="2">
        <td class="product-name">Widget B</td>
        <td class="product-price">$29.99</td>
        <td><span class="badge badge-active">Active</span></td>
      </tr>
      <tr class="product-row" data-id="3">
        <td class="product-name">Widget C</td>
        <td class="product-price">$9.99</td>
        <td><span class="badge badge-inactive">Inactive</span></td>
      </tr>
    </tbody>
  </table>

  <p id="visible-text">This paragraph is visible.</p>
  <p id="hidden-text" class="hidden-item">This paragraph is hidden.</p>

  <input id="enabled-input" type="text" value="editable" />
  <input id="disabled-input" type="text" value="read-only" disabled />

  <label><input id="checked-box" type="checkbox" checked /> Agree to terms</label>
  <label><input id="unchecked-box" type="checkbox" /> Subscribe</label>
</body>
</html>
